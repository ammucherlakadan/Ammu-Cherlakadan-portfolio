<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Ammu Cherlakadan</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#F4EDE0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F4EDE0;
      --warm-white: #FBF7F0;
      --brown-deep: #2E1A0E;
      --brown-mid:  #6B3F2A;
      --sage:       #8A9A7B;
      --terracotta: #C17D52;
    }

    body {
      background: var(--warm-white);
      color: var(--brown-mid);
      font-family: 'Cormorant Garant', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
    }

    .label {
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--sage);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 300;
      color: var(--brown-deep);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-style: italic;
      color: var(--brown-mid);
      opacity: 0.8;
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 2.5rem;
    }

    a {
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--terracotta);
      text-decoration: none;
      border-bottom: 1px solid rgba(193, 125, 82, 0.4);
      padding-bottom: 0.15rem;
      transition: border-color 0.2s ease;
    }
    a:hover { border-color: var(--terracotta); }

    .rule {
      width: 3rem;
      height: 1px;
      background: var(--sage);
      margin: 0 auto 2rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <p class="label">— 404 —</p>
  <h1>Lost in<br>the light.</h1>
  <div class="rule"></div>
  <p>This page doesn't exist — but the work does.</p>
  <a href="/">Take me back to the portfolio</a>
</body>
</html>
