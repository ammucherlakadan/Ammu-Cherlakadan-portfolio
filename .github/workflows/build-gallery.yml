name: Build Gallery Data

# Runs automatically whenever images are pushed to GitHub.
# Regenerates gallery-data.js and commits it back — no manual step needed.

on:
  push:
    branches: [main]
    paths:
      - 'images/**'      # only trigger when images change
      - 'build.js'       # or if the build script itself changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate gallery-data.js
        run: node build.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery-data.js
          git diff --cached --quiet || git commit -m "chore: regenerate gallery-data.js [skip ci]"
          git push
